<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET Exam - Hoài An Nhiên</title>
    <!-- Tailwind CSS with Typography plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .prose pre { background-color: #f1f5f9; padding: 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; }
        .prose blockquote { border-left-color: #3b82f6; font-style: italic; color: #64748b; }
        .prose h1, .prose h2, .prose h3 { color: #1e3a8a; font-weight: 800; }
        /* Smooth transitions */
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mocking Lucide icons for React in browser
        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);
            useEffect(() => {
                if (window.lucide && spanRef.current) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    spanRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            "stroke-width": 2
                        }
                    });
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center leading-none" />;
        };

        const Timer = (props) => <Icon name="Timer" {...props} />;
        const Clock = (props) => <Icon name="Clock" {...props} />;
        const ChevronRight = (props) => <Icon name="ChevronRight" {...props} />;
        const ChevronLeft = (props) => <Icon name="ChevronLeft" {...props} />;
        const Send = (props) => <Icon name="Send" {...props} />;
        const CheckCircle = (props) => <Icon name="CheckCircle" {...props} />;
        const Info = (props) => <Icon name="Info" {...props} />;
        const Phone = (props) => <Icon name="Phone" {...props} />;
        const MapPin = (props) => <Icon name="MapPin" {...props} />;
        const Sparkles = (props) => <Icon name="Sparkles" {...props} />;
        const Loader2 = (props) => <Icon name="Loader2" className={`animate-spin ${props.className || ""}`} {...props} />;
        const BookOpen = (props) => <Icon name="BookOpen" {...props} />;
        const MessageSquareText = (props) => <Icon name="MessageSquareText" {...props} />;

        const App = () => {
            const [currentStep, setCurrentStep] = useState('landing'); // landing, exam, result
            const [timeLeft, setTimeLeft] = useState(3600); // 60 minutes
            const [currentPart, setCurrentPart] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isFinished, setIsFinished] = useState(false);
            
            // AI States
            const [aiLoading, setAiLoading] = useState(false);
            const [aiFeedback, setAiFeedback] = useState(null);
            const [explanationId, setExplanationId] = useState(null);
            const [explanations, setExplanations] = useState({});
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [showKeyInput, setShowKeyInput] = useState(false);

            // Center Info
            const centerInfo = {
                name: "TRUNG TÂM TIẾNG ANH CÔ THUÝ",
                company: "CÔNG TY TNHH GIÁO DỤC VÀ ĐÀO TẠO HOÀI AN NHIÊN",
                mst: "0318842992",
                branches: [
                    { id: 1, name: "Cơ sở 1 (CS1)", addr: "202/1 Nguyễn Thị Lắng, Tân Phú Trung, Củ Chi, TP. HCM" },
                    { id: 2, name: "Cơ sở 2 (CS2)", addr: "61 Lê Đình Thám, Khu Phố 23, Tân Phú, TP. HCM" },
                    { id: 3, name: "Cơ sở 3 (CS3)", addr: "325/5T Nguyễn Thị Thảnh, Hóc Môn, TP.HCM" }
                ]
            };

            // Mock KET Data
            const ketParts = [
                {
                    title: "Part 1: Short Messages",
                    type: "reading",
                    questions: [
                        {
                            id: 'q1',
                            text: "What does this sign mean?",
                            content: "NO BICYCLES AGAINST THE WINDOW PLEASE",
                            options: [
                                "You cannot park your bike here.",
                                "You can only wash your bike here.",
                                "You should put your bike inside."
                            ],
                            correct: 0
                        },
                        {
                            id: 'q2',
                            text: "Hi Mom, can you pick me up after football practice? It finishes at 5 PM instead of 4 PM. Thanks, Tom.",
                            options: [
                                "Tom is going to be late.",
                                "Tom needs his football kit.",
                                "Tom wants to go to practice at 5 PM."
                            ],
                            correct: 0
                        }
                    ]
                },
                {
                    title: "Part 2: Matching",
                    type: "reading",
                    questions: [
                        {
                            id: 'q3',
                            text: "Which person enjoys outdoor sports in winter?",
                            options: ["Anna: I love skiing and skating.", "Ben: I prefer reading books by the fire.", "Clara: I like swimming in indoor pools."],
                            correct: 0
                        }
                    ]
                },
                {
                    title: "Part 5: Gapped Text",
                    type: "reading",
                    questions: [
                        {
                            id: 'q4',
                            text: "Yesterday, I ___ to the cinema with my friends.",
                            options: ["go", "went", "gone"],
                            correct: 1
                        },
                        {
                            id: 'q5',
                            text: "The movie was very ___. We enjoyed it a lot.",
                            options: ["excited", "exciting", "bore"],
                            correct: 1
                        }
                    ]
                },
                {
                    title: "Part 6: Writing (Message)",
                    type: "writing",
                    instruction: "Write a message to your friend Alex. Invite him to a party on Saturday. Say what time it starts.",
                    placeholder: "Write your answer here (25 words or more)..."
                }
            ];

            const saveApiKey = (key) => {
                const cleanKey = key.trim();
                setApiKey(cleanKey);
                localStorage.setItem('gemini_api_key', cleanKey);
                setShowKeyInput(false);
                if (cleanKey) alert("Đã lưu API Key thành công!");
            };

            const clearApiKey = () => {
                if (confirm("Xác nhận xóa API Key khỏi máy?")) {
                    setApiKey("");
                    localStorage.removeItem('gemini_api_key');
                    setShowKeyInput(false);
                }
            };

            // Gemini API Integration
            const callGemini = async (prompt, systemInstruction = "") => {
                if (!apiKey) {
                    setShowKeyInput(true);
                    throw new Error("Lỗi: Chưa có API Key!");
                }
                let delay = 1000;
                for (let i = 0; i < 3; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: systemInstruction }] }
                            })
                        });
                        const data = await response.json();
                        if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        }
                        if (data.error) {
                            throw new Error(data.error.message || "API Error");
                        }
                        throw new Error("Không có phản hồi từ AI");
                    } catch (err) {
                        if (i === 2) throw err;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                }
            };

            const analyzeWriting = async () => {
                const studentResponse = answers['part3'] || '';
                if (studentResponse.trim().split(/\s+/).length < 5) {
                    alert("Vui lòng viết bài (ít nhất 5 từ) trước khi yêu cầu chấm điểm!");
                    return;
                }

                setAiLoading(true);
                const systemPrompt = "Bạn là một giám khảo chấm thi KET (A2 Key) chuyên nghiệp tại Trung tâm Hoài An Nhiên. Hãy đưa ra nhận xét bằng tiếng Việt.";
                const userPrompt = `Hãy chấm bài viết của học sinh cho đề bài: "${ketParts[3].instruction}". 
                Bài viết của học sinh: "${studentResponse}". 
                Hãy đánh giá: 
                1. Điểm số (trên thang điểm 5).
                2. Nhận xét về Ngữ pháp và Từ vựng.
                3. Đưa ra một phiên bản sửa lỗi hoàn chỉnh tốt hơn.
                Hãy trình bày đẹp mắt bằng markdown.`;

                try {
                    const result = await callGemini(userPrompt, systemPrompt);
                    setAiFeedback(result);
                } catch (error) {
                    console.error(error);
                    alert("Lỗi: " + error.message);
                } finally {
                    setAiLoading(false);
                }
            };

            const getExplanation = async (questionId, questionText, correctAnswer, studentAnswer, options) => {
                setExplanationId(questionId);
                const systemPrompt = "Bạn là trợ giảng tiếng Anh tại Hoài An Nhiên. Giải thích ngắn gọn, dễ hiểu bằng tiếng Việt.";
                const userPrompt = `Giải thích tại sao đáp án "${correctAnswer}" là đúng cho câu hỏi KET này: "${questionText}". 
                Các lựa chọn là: ${options.join(', ')}. 
                Học sinh đã chọn: "${studentAnswer}".`;

                try {
                    const result = await callGemini(userPrompt, systemPrompt);
                    setExplanations(prev => ({ ...prev, [questionId]: result }));
                } catch (error) {
                    console.error(error);
                    setExplanations(prev => ({ ...prev, [questionId]: "Lỗi: " + error.message }));
                } finally {
                    setExplanationId(null);
                }
            };

            // Timer logic
            useEffect(() => {
                let timer;
                if (currentStep === 'exam' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0 && currentStep === 'exam') {
                    finishExam();
                }
                return () => clearInterval(timer);
            }, [currentStep, timeLeft]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            const handleAnswer = (qId, value) => {
                setAnswers(prev => ({ ...prev, [qId]: value }));
            };

            const finishExam = () => {
                setIsFinished(true);
                setCurrentStep('result');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const calculateScore = () => {
                let score_val = 0;
                let total_val = 0;
                ketParts.forEach(part => {
                    if (part.questions) {
                        part.questions.forEach(q => {
                            total_val++;
                            if (answers[q.id] === q.correct) score_val++;
                        });
                    }
                });
                return { score: score_val, total: total_val };
            };

            const { score, total } = calculateScore();

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-12">
                    {/* Header */}
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.location.reload()}>
                                <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg ring-2 ring-blue-100">AN</div>
                                <div className="hidden sm:block">
                                    <h1 className="text-sm font-black leading-tight text-blue-900 uppercase">Hoài An Nhiên</h1>
                                    <p className="text-[10px] text-slate-500 uppercase tracking-wider font-bold">English Coaching</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <a 
                                    href="index.html"
                                    className="text-[10px] px-3 py-1.5 rounded-full font-black uppercase tracking-widest bg-slate-100 text-slate-600 border border-slate-200 hover:bg-slate-200 transition-all no-underline"
                                >
                                    🏠 Trang Chủ
                                </a>
                                <button 
                                    onClick={() => setShowKeyInput(true)} 
                                    className={`text-[10px] px-3 py-1.5 rounded-full font-black uppercase tracking-widest transition-all ${apiKey ? 'bg-green-50 text-green-600 border border-green-100' : 'bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-100'}`}
                                >
                                    {apiKey ? "✨ AI Đã Sẵn Sàng" : "⚙️ Cấu hình AI"}
                                </button>
                                {currentStep === 'exam' && (
                                    <div className={`flex items-center gap-2 px-4 py-1.5 rounded-full font-mono font-bold border-2 transition-all ${timeLeft < 300 ? 'bg-red-50 border-red-200 text-red-600 animate-pulse' : 'bg-slate-100 border-slate-200 text-slate-700'}`}>
                                        <Clock size={16} />
                                        {formatTime(timeLeft)}
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:py-8 lg:py-12">
                        {showKeyInput && (
                            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                <div className="bg-white p-8 rounded-[2rem] shadow-2xl max-w-md w-full border border-slate-100 scale-in-center">
                                    <h3 className="text-xl font-black mb-4 flex items-center gap-3 text-blue-900 uppercase"><Sparkles size={24} className="text-blue-600"/> Cấu hình Trợ lý AI</h3>
                                    <p className="text-sm text-slate-500 mb-6 font-medium leading-relaxed italic">Nhập Gemini API Key để mở khóa sức mạnh AI (chấm bài, giải thích chi tiết).</p>
                                    <input 
                                        type="password"
                                        placeholder="Paste your API Key here..."
                                        className="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 focus:border-blue-500 focus:ring-8 focus:ring-blue-50 outline-none transition-all mb-4 text-sm font-mono"
                                        defaultValue={apiKey}
                                        id="api_key_input"
                                    />
                                    <div className="flex flex-col gap-3">
                                        <button 
                                            onClick={() => saveApiKey(document.getElementById('api_key_input').value)}
                                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-200 transition-all hover:scale-[1.02] active:scale-100 uppercase tracking-widest text-sm"
                                        >
                                            Kích hoạt AI
                                        </button>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => setShowKeyInput(false)}
                                                className="flex-1 py-3 text-slate-400 font-bold hover:text-slate-600 transition-colors uppercase text-[10px] tracking-widest"
                                            >
                                                Hủy bỏ
                                            </button>
                                            {apiKey && (
                                                <button 
                                                    onClick={clearApiKey}
                                                    className="flex-1 py-3 text-red-300 font-bold hover:text-red-500 transition-colors uppercase text-[10px] tracking-widest"
                                                >
                                                    Xóa Key
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentStep === 'landing' && (
                            <div className="page-transition bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                                <div className="bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-800 p-12 md:p-20 text-white text-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-white"><Sparkles size={180} /></div>
                                    <div className="relative z-10">
                                        <span className="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full text-xs font-black uppercase tracking-[4px] mb-6 inline-block">Preparation Toolkit</span>
                                        <h2 className="text-5xl md:text-6xl font-black mb-6 tracking-tighter leading-none">A2 Key (KET) Exam</h2>
                                        <p className="text-blue-100 text-lg md:text-xl font-medium opacity-90 max-w-2xl mx-auto italic">Nâng tầm kỹ năng tiếng Anh với sự hỗ trợ của Trí Tuệ Nhân Tạo được cá nhân hóa tại Hoài An Nhiên. ✨</p>
                                    </div>
                                </div>
                                <div className="p-8 md:p-16">
                                    <div className="grid md:grid-cols-2 gap-16">
                                        <div className="space-y-8">
                                            <h3 className="font-black text-2xl flex items-center gap-3 text-blue-900 border-b-4 border-blue-50 pb-4 uppercase tracking-tight">
                                                <Info size={28} className="text-blue-600" /> Cấu trúc bài thi
                                            </h3>
                                            <ul className="space-y-6">
                                                <li className="flex items-center gap-5 group">
                                                    <div className="bg-green-100 text-green-600 p-3 rounded-2xl shadow-sm group-hover:scale-110 transition-transform"><CheckCircle size={20}/></div>
                                                    <span className="font-bold text-slate-700 text-lg">Reading & Writing (60)</span>
                                                </li>
                                                <li className="flex items-center gap-5 group">
                                                    <div className="bg-blue-100 text-blue-600 p-3 rounded-2xl shadow-sm group-hover:scale-110 transition-transform"><Sparkles size={20}/></div>
                                                    <div>
                                                      <span className="font-black text-blue-700 text-lg block leading-none">AI Writing Feedback</span>
                                                      <span className="text-xs text-blue-400 font-bold uppercase tracking-widest mt-1 inline-block">Chấm điểm & Sửa lỗi</span>
                                                    </div>
                                                </li>
                                                <li className="flex items-center gap-5 group">
                                                    <div className="bg-purple-100 text-purple-600 p-3 rounded-2xl shadow-sm group-hover:scale-110 transition-transform"><MessageSquareText size={20}/></div>
                                                    <div>
                                                      <span className="font-black text-purple-700 text-lg block leading-none">AI Explainer</span>
                                                      <span className="text-xs text-purple-400 font-bold uppercase tracking-widest mt-1 inline-block">Giải thích thông minh</span>
                                                    </div>
                                                </li>
                                            </ul>
                                        </div>
                                        <div className="bg-slate-50 p-12 rounded-[2rem] border-2 border-dashed border-slate-200 flex flex-col justify-center shadow-inner">
                                            <p className="text-slate-500 mb-10 text-center italic text-lg leading-relaxed font-medium">
                                                "Sẵn sàng vượt qua kỳ thi KET với độ tự tin cao nhất cùng hệ thống luyện thi tích hợp AI đầu tiên tại khu vực."
                                            </p>
                                            <button 
                                                onClick={() => setCurrentStep('exam')}
                                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-6 rounded-2xl transition-all transform hover:-translate-y-2 shadow-2xl shadow-blue-200 flex items-center justify-center gap-4 text-xl uppercase tracking-[4px]"
                                            >
                                                BẮT ĐẦU <ChevronRight size={28} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentStep === 'exam' && (
                            <div className="page-transition space-y-8">
                                <div className="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden shadow-inner ring-4 ring-white">
                                    <div 
                                        className="bg-gradient-to-r from-blue-400 to-blue-600 h-full transition-all duration-700 ease-in-out shadow-sm"
                                        style={{ width: `${((currentPart + 1) / ketParts.length) * 100}%` }}
                                    ></div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] shadow-xl p-8 md:p-12 border border-slate-200 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-2 h-full bg-blue-600"></div>
                                    <div className="flex justify-between items-end mb-12 border-b-2 border-slate-50 pb-8">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-black text-blue-400 uppercase tracking-[6px] mb-2">Section Objective</span>
                                            <h3 className="text-4xl font-black text-slate-800 tracking-tighter">{ketParts[currentPart].title}</h3>
                                        </div>
                                        <span className="bg-slate-900 text-white px-8 py-3 rounded-2xl text-xl font-black shadow-lg flex items-center gap-3">
                                           {currentPart + 1} <span className="text-slate-500 font-normal">/</span> {ketParts.length}
                                        </span>
                                    </div>

                                    <div className="space-y-16">
                                        {ketParts[currentPart].questions ? (
                                            ketParts[currentPart].questions.map((q, idx) => (
                                                <div key={q.id} className="group animate-in slide-in-from-bottom-4 transition-all">
                                                    <div className="flex gap-6 mb-8">
                                                        <span className="flex-shrink-0 w-12 h-12 bg-slate-100 text-slate-800 rounded-2xl flex items-center justify-center font-black text-xl shadow-inner border-2 border-white ring-2 ring-slate-50">{idx + 1}</span>
                                                        <p className="font-bold text-2xl text-slate-700 pt-1 leading-snug tracking-tight">{q.text}</p>
                                                    </div>
                                                    
                                                    {q.content && (
                                                        <div className="ml-16 mb-10 p-10 bg-blue-50/50 border-2 border-dashed border-blue-200 rounded-[2rem] text-center font-black text-blue-900 text-3xl shadow-inner tracking-widest uppercase">
                                                            {q.content}
                                                        </div>
                                                    )}
                                                    
                                                    <div className="ml-16 grid gap-4 lg:grid-cols-1">
                                                        {q.options.map((opt, oIdx) => (
                                                            <label key={oIdx} className={`flex items-center gap-6 p-6 rounded-[1.5rem] border-2 cursor-pointer transition-all duration-300 ${answers[q.id] === oIdx ? 'bg-blue-600 border-blue-600 text-white shadow-xl shadow-blue-100 translate-x-4' : 'bg-slate-50 border-transparent hover:border-blue-200 hover:bg-white hover:shadow-md'}`}>
                                                                <input 
                                                                    type="radio" 
                                                                    name={q.id} 
                                                                    checked={answers[q.id] === oIdx}
                                                                    onChange={() => handleAnswer(q.id, oIdx)}
                                                                    className="w-6 h-6 text-white focus:ring-offset-0 focus:ring-0 border-2 bg-transparent checked:bg-white"
                                                                />
                                                                <span className={`font-bold text-xl ${answers[q.id] === oIdx ? 'text-white' : 'text-slate-600'}`}>{opt}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="space-y-10 animate-in fade-in">
                                                <div className="p-10 bg-indigo-50 border-l-[12px] border-indigo-500 text-indigo-900 rounded-r-[2rem] shadow-sm ring-4 ring-indigo-50/20">
                                                    <p className="font-black text-2xl mb-4 flex items-center gap-4 uppercase tracking-tighter leading-none"><BookOpen size={32}/> Question Requirements:</p>
                                                    <p className="text-xl font-medium leading-relaxed opacity-80">{ketParts[currentPart].instruction}</p>
                                                </div>
                                                <div className="relative group">
                                                    <textarea 
                                                        className="w-full h-96 p-10 border-4 border-slate-50 rounded-[2.5rem] focus:ring-[16px] focus:ring-blue-50 focus:border-blue-500 outline-none transition-all text-2xl leading-relaxed shadow-inner bg-slate-50 group-hover:bg-white placeholder:text-slate-300 font-medium"
                                                        placeholder={ketParts[currentPart].placeholder}
                                                        value={answers[`part${currentPart}`] || ''}
                                                        onChange={(e) => handleAnswer(`part${currentPart}`, e.target.value)}
                                                    ></textarea>
                                                    <div className="absolute bottom-8 right-10 text-xs font-black text-white bg-slate-900 px-6 py-3 rounded-2xl shadow-xl uppercase tracking-[3px] border border-slate-700">
                                                        {(answers[`part${currentPart}`] || '').trim().split(/\s+/).filter(x => x).length} Words Count
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="mt-20 flex justify-between border-t-2 border-slate-50 pt-12">
                                        <button 
                                            disabled={currentPart === 0}
                                            onClick={() => setCurrentPart(prev => prev - 1)}
                                            className="flex items-center gap-3 text-slate-300 font-black hover:text-indigo-600 disabled:opacity-0 px-10 py-4 transition-all uppercase tracking-[4px] text-xs"
                                        >
                                            <ChevronLeft size={24} /> Back
                                        </button>
                                        {currentPart === ketParts.length - 1 ? (
                                            <button 
                                                onClick={finishExam}
                                                className="bg-green-600 hover:bg-green-700 text-white px-16 py-5 rounded-[1.5rem] font-black flex items-center gap-4 shadow-2xl shadow-green-100 hover:scale-105 transition-all active:scale-95 uppercase tracking-[4px] text-lg"
                                            >
                                                Nộp Bài <Send size={28} />
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={() => setCurrentPart(prev => prev + 1)}
                                                className="bg-blue-600 hover:bg-blue-700 text-white px-16 py-5 rounded-[1.5rem] font-black flex items-center gap-4 shadow-2xl shadow-blue-100 hover:scale-105 transition-all uppercase tracking-[4px] text-lg"
                                            >
                                                Tiếp Theo <ChevronRight size={28} />
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentStep === 'result' && (
                            <div className="page-transition max-w-4xl mx-auto space-y-12">
                                {/* Header Result */}
                                <div className="bg-white rounded-[3rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.15)] overflow-hidden border border-slate-100">
                                    <div className="bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-700 p-16 text-white text-center relative overflow-hidden">
                                         <div className="absolute top-10 left-12 flex items-center gap-3 opacity-30">
                                            <Sparkles size={24} />
                                            <span className="text-xs font-black tracking-[6px] uppercase">Official Statement</span>
                                         </div>
                                         <h2 className="text-6xl font-black mb-4 tracking-tighter leading-none">EXCELLENT!</h2>
                                         <p className="text-blue-100 text-xl font-medium opacity-70 italic">Kỳ thi thử A2 Key (KET) đã hoàn thành xuất sắc.</p>
                                    </div>

                                    <div className="p-12 md:p-16 grid md:grid-cols-2 gap-16 items-center border-b border-slate-100">
                                        <div className="text-center md:text-left space-y-8">
                                            <div>
                                                <span className="text-[10px] font-black text-slate-300 uppercase tracking-[8px] mb-4 block">Reading Accuracy</span>
                                                <div className="text-[10rem] font-black text-blue-600 leading-none tracking-tighter flex items-end justify-center md:justify-start">
                                                  {score} <span className="text-4xl text-slate-200 font-normal ml-4 mb-8">/ {total}</span>
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-3 justify-center md:justify-start">
                                                <span className={`px-10 py-3 rounded-full text-sm font-black uppercase tracking-[3px] border-2 ${score >= total*0.8 ? 'bg-green-50 text-green-700 border-green-100' : score >= total*0.6 ? 'bg-blue-50 text-blue-700 border-blue-100' : 'bg-orange-50 text-orange-700 border-orange-100'}`}>
                                                    {score >= total*0.8 ? 'Distinction' : score >= total*0.6 ? 'Pass' : 'Practice'}
                                                </span>
                                                <span className="bg-slate-900 text-white px-10 py-3 rounded-full text-sm font-black uppercase tracking-[3px] shadow-lg">Level A2</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50/80 backdrop-blur-sm p-12 rounded-[3rem] border-4 border-white relative shadow-inner group">
                                           <h4 className="font-black text-blue-900 text-[10px] mb-6 uppercase tracking-[4px] flex items-center gap-3">
                                             <Sparkles size={20} className="text-blue-500 animate-pulse" /> AI Performance Summary
                                           </h4>
                                           <div className="text-slate-600 font-bold text-xl leading-relaxed italic opacity-80 group-hover:opacity-100 transition-opacity">
                                             "Phần Reading của bạn có tỉ lệ chính xác là <span className="text-blue-600">{Math.round(score/total*100)}%</span>. Đây là nền tảng tốt. Hãy thực hiện Chấm điểm AI cho bài viết để hoàn thiện kỹ năng."
                                           </div>
                                        </div>
                                    </div>

                                    <div className="p-12 md:p-16 space-y-20">
                                        {/* Writing AI Section */}
                                        <section>
                                            <h3 className="text-4xl font-black text-slate-900 mb-10 flex items-center gap-5 tracking-tighter">
                                                <MessageSquareText className="text-blue-600" size={40} /> ✨ Writing Analysis
                                            </h3>
                                            <div className="bg-slate-100 rounded-[3rem] p-10 md:p-16 border-4 border-white relative shadow-inner">
                                                {!aiFeedback && !aiLoading && (
                                                    <div className="text-center py-10">
                                                        <p className="text-slate-500 mb-12 font-bold text-2xl leading-relaxed max-w-xl mx-auto">Click bên dưới để Trợ lý AI thực hiện <span className="underline decoration-blue-500 decoration-4 underline-offset-8">chấm điểm chuyên sâu</span> cho bài viết của bạn.</p>
                                                        <button 
                                                            onClick={analyzeWriting}
                                                            className="bg-blue-600 hover:bg-blue-700 text-white font-black py-6 px-16 rounded-[2rem] shadow-[0_20px_40px_-12px_rgba(59,130,246,0.5)] transition-all hover:scale-105 flex items-center gap-4 mx-auto uppercase tracking-[4px] text-lg active:scale-95"
                                                        >
                                                            <Sparkles size={24} /> Phân Tích AI
                                                        </button>
                                                    </div>
                                                )}
                                                
                                                {aiLoading && (
                                                    <div className="text-center py-20 space-y-10">
                                                        <Loader2 size={80} className="text-blue-500 animate-spin mx-auto opacity-50" />
                                                        <p className="text-blue-600 font-black text-2xl animate-pulse uppercase tracking-[8px]">AI Evaluator Processing...</p>
                                                    </div>
                                                )}

                                                {aiFeedback && (
                                                    <div className="bg-white p-10 md:p-16 rounded-[3rem] shadow-2xl border border-slate-100 animate-in zoom-in-95 duration-500">
                                                        <div className="prose prose-slate prose-lg max-w-none prose-headings:font-black prose-p:font-medium prose-p:leading-loose text-slate-700" 
                                                             dangerouslySetInnerHTML={{ __html: marked.parse(aiFeedback) }} />
                                                        <button 
                                                            onClick={() => setAiFeedback(null)}
                                                            className="mt-16 text-[10px] font-black text-slate-300 hover:text-red-500 uppercase tracking-[6px] flex items-center gap-3 transition-colors mx-auto"
                                                        >
                                                            Làm mới phân tích từ AI
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </section>

                                        {/* Review MCQ Section */}
                                        <section>
                                            <h3 className="text-4xl font-black text-slate-900 mb-10 flex items-center gap-5 tracking-tighter">
                                                <BookOpen className="text-indigo-600" size={40} /> ✨ Answer Analytics
                                            </h3>
                                            <div className="grid gap-10 lg:grid-cols-1">
                                                {ketParts.filter(p => p.questions).map((part, pIdx) => (
                                                    <div key={pIdx} className="space-y-6">
                                                        {part.questions.map(q => (
                                                            <div key={q.id} className="p-10 bg-slate-50/50 rounded-[2.5rem] border-4 border-white hover:bg-white hover:shadow-2xl transition-all duration-500 group">
                                                                <div className="flex flex-col md:flex-row justify-between items-start gap-6 mb-8">
                                                                    <p className="font-bold text-2xl text-slate-800 leading-tight tracking-tight max-w-2xl">{q.text}</p>
                                                                    {answers[q.id] === q.correct ? 
                                                                        <span className="bg-green-100 text-green-700 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[3px] border-2 border-green-200 shadow-sm flex-shrink-0">Correct</span> :
                                                                        <span className="bg-red-50 text-red-600 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[3px] border-2 border-red-100 shadow-sm flex-shrink-0">Incorrect</span>
                                                                    }
                                                                </div>
                                                                <div className="text-sm font-black text-slate-400 mb-8 bg-white px-6 py-4 rounded-2xl border-2 border-dashed border-slate-100 inline-flex items-center gap-3 uppercase tracking-widest">
                                                                    Official Answer: <span className="text-green-600 text-lg">{q.options[q.correct]}</span>
                                                                </div>
                                                                
                                                                {!explanations[q.id] ? (
                                                                    <button 
                                                                        onClick={() => getExplanation(q.id, q.text, q.options[q.correct], q.options[answers[q.id]] || "Chưa trả lời", q.options)}
                                                                        disabled={explanationId === q.id}
                                                                        className="flex items-center gap-4 text-xs font-black text-blue-600 hover:text-blue-800 transition-all uppercase tracking-[4px] border-b-2 border-transparent hover:border-blue-600 pb-1 disabled:opacity-30"
                                                                    >
                                                                        {explanationId === q.id ? <Loader2 size={18} className="animate-spin" /> : <Sparkles size={18} />} 
                                                                        AI Explain Solution
                                                                    </button>
                                                                ) : (
                                                                    <div className="mt-8 p-10 bg-blue-600 text-white rounded-[2rem] shadow-2xl animate-in slide-in-from-top-6 duration-500 relative overflow-hidden">
                                                                        <div className="absolute top-0 right-0 p-6 opacity-10"><Sparkles size={60} /></div>
                                                                        <p className="font-black mb-6 flex items-center gap-3 uppercase tracking-[4px] text-[10px] text-blue-100 leading-none"><Sparkles size={16} /> AI Explanation:</p>
                                                                        <div className="font-bold text-xl leading-relaxed whitespace-pre-wrap">{explanations[q.id]}</div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>

                                    <div className="p-16 bg-slate-900 text-center relative overflow-hidden">
                                        <div className="absolute inset-0 bg-blue-600 opacity-5 pointer-events-none"></div>
                                        <h4 className="text-white font-black text-3xl mb-10 tracking-tighter uppercase">Reach Your Goals</h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl mx-auto relative z-10">
                                            <button 
                                                onClick={() => window.location.reload()}
                                                className="bg-white/5 hover:bg-white/10 text-white py-6 rounded-[1.5rem] font-black transition-all border-2 border-white/10 uppercase tracking-[6px] text-xs hover:scale-105 active:scale-100"
                                            >
                                                Restart Practice
                                            </button>
                                            <a 
                                                href="tel:0773117254"
                                                className="bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-[1.5rem] font-black flex items-center justify-center gap-4 shadow-2xl transition-all uppercase tracking-[6px] text-xs hover:scale-105 active:scale-100"
                                            >
                                                Contact Support <Phone size={24} />
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="mt-24 bg-white border-t-8 border-slate-50 py-24 px-8 shadow-inner">
                        <div className="max-w-6xl mx-auto">
                            <div className="grid md:grid-cols-3 gap-20">
                                <div className="space-y-10">
                                    <div className="flex items-center gap-5">
                                        <div className="w-16 h-16 bg-blue-600 rounded-[1.5rem] flex items-center justify-center text-white font-black text-4xl shadow-[0_20px_40px_-12px_rgba(59,130,246,0.6)] ring-4 ring-blue-50">AN</div>
                                        <h4 className="font-black text-blue-900 leading-none uppercase text-2xl tracking-tighter">Hoài An Nhiên<br/><span className="text-blue-500 text-xs tracking-[4px]">Coaching</span></h4>
                                    </div>
                                    <div className="space-y-6">
                                      <p className="text-sm text-slate-400 leading-loose font-bold uppercase tracking-[4px]">
                                          {centerInfo.company}<br />
                                          Registry ID: {centerInfo.mst}
                                      </p>
                                      <div className="inline-flex items-center gap-6 bg-slate-50 text-slate-800 px-8 py-5 rounded-[1.5rem] font-black shadow-inner text-2xl border-2 border-white">
                                          <Phone size={32} className="text-blue-600" /> 0773 117 254
                                      </div>
                                    </div>
                                </div>
                                <div className="md:col-span-2 grid gap-8">
                                    <h5 className="font-black text-slate-300 uppercase tracking-[10px] text-xs mb-6">Learning Centers Campus</h5>
                                    <div className="grid sm:grid-cols-1 gap-6">
                                      {centerInfo.branches.map(branch => (
                                          <div key={branch.id} className="p-8 bg-slate-50 rounded-[2.5rem] border-4 border-white flex gap-8 hover:shadow-2xl hover:bg-white transition-all duration-500 group">
                                              <div className="mt-1 bg-white text-blue-500 p-4 rounded-2xl shadow-sm group-hover:scale-110 transition-transform"><MapPin size={32} /></div>
                                              <div>
                                                  <h5 className="text-[10px] font-black text-blue-400 uppercase tracking-[6px] mb-2">{branch.name} Location</h5>
                                                  <p className="text-xl font-bold text-slate-800 group-hover:text-blue-900 duration-300">{branch.addr}</p>
                                              </div>
                                          </div>
                                      ))}
                                    </div>
                                </div>
                            </div>
                            <div className="mt-32 pt-12 border-t border-slate-50 text-center">
                                <p className="text-[10px] text-slate-200 uppercase tracking-[12px] font-black">
                                    © {new Date().getFullYear()} Hoài An Nhiên Education • AI System v2.1 Platinum
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
